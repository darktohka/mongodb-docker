name: Autobuild for Docker

on: [push, workflow_dispatch, repository_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build MongoDB
        run: |
          cargo run --release -- \
            --ubuntu-codename jammy \
            --arches amd64,arm64 \
            --output-amd64 binary-x86_64 \
            --output-arm64 binary-aarch64 \
            --manifest-dir package-manifests \
            --staging-dir staging-rootfs \
            --deb-cache-dir deb-cache
      - name: Push the image
        run: |
          docker run -v $(pwd):/srv darktohka/ocitool upload --username "${{ secrets.DOCKER_USERNAME }}" --password "${{ secrets.DOCKER_PASSWORD }}"
